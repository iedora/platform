---
# Dynamic inventory for Tofu-provisioned hosts.
# Reads ansible_host resources from the hetzner Tofu state.
# Cloudflare-Tunnel/on-prem hosts use inventory.onprem.yml instead.
#
# Usage:
#   ansible-playbook -i inventory.yml --limit hetzner setup.yml

plugin: cloud.terraform.terraform_provider
project_path:
  - ../tofu/hetzner
binary_path: tofu
