---
# Static inventory for on-prem servers (boxes NOT provisioned by Tofu).
#
# Tofu's dynamic inventory (inventory.yml) only knows hosts that Tofu created.
# For an existing physical/VM host you already own, declare it here.
#
# Bootstrap (first run on a fresh box):
#   1. Have an SSH public key at ~/.ssh/id_ed25519.pub (or run `make ssh-key`).
#   2. Run the bootstrap with the existing sudo user (e.g. pwu):
#        make ansible-onprem-bootstrap BOOTSTRAP_USER=pwu
#      (creates the `deploy` user, installs your SSH key, grants NOPASSWD sudo)
#   3. Every subsequent run is `make ansible-onprem` as `deploy` + SSH key.
#
# Cloudflare Tunnel token is read from env $CLOUDFLARED_TUNNEL_TOKEN by
# setup.yml's onprem play — no per-host wiring needed here.
#
# Adding another on-prem server: copy a host block and re-run.

all:
  children:
    onprem:
      hosts:
        meta-menu-prod:
          ansible_host: 192.168.50.53
      vars:
        ansible_user: deploy
        ansible_port: 22
        ansible_ssh_private_key_file: ~/.ssh/id_ed25519
        ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"

    servers:
      children:
        onprem: {}
    metal:
      children:
        onprem: {}
