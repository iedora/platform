---
# Bootstrap an existing server (not Tofu-provisioned) so subsequent
# setup.yml runs can connect as `deploy` + SSH key.
#
# Run ONCE per fresh server using an existing sudo user (e.g. pwu, ubuntu)
# with password authentication:
#
#   make ansible-onprem-bootstrap BOOTSTRAP_USER=pwu
#
# Idempotent — re-running on an already-bootstrapped host is a no-op.

- name: Bootstrap — create deploy user + install SSH key
  hosts: onprem
  become: true
  gather_facts: false

  # ansible_user is overridden on the CLI by the Makefile target;
  # ansible_ssh_pass / ansible_become_pass come from --ask-pass / --ask-become-pass.
  vars_files:
    - ../shared/vars.yml

  pre_tasks:
    - name: Wait for SSH transport (auth + python ping)
      ansible.builtin.wait_for_connection:
        delay: 2
        timeout: 60

  tasks:
    - name: Read local SSH public key
      ansible.builtin.slurp:
        src: "{{ lookup('env', 'HOME') }}/.ssh/id_ed25519.pub"
      delegate_to: localhost
      become: false
      register: local_ssh_pubkey

    - name: Create deploy user
      ansible.builtin.user:
        name: "{{ deploy_user }}"
        shell: /bin/bash
        groups: sudo
        append: true
        state: present
        create_home: true

    - name: Grant passwordless sudo to deploy user
      ansible.builtin.copy:
        dest: "/etc/sudoers.d/90-{{ deploy_user }}"
        content: "{{ deploy_user }} ALL=(ALL) NOPASSWD:ALL\n"
        owner: root
        group: root
        mode: "0440"
        validate: "visudo -cf %s"

    - name: Install SSH public key for deploy user
      ansible.posix.authorized_key:
        user: "{{ deploy_user }}"
        key: "{{ local_ssh_pubkey.content | b64decode }}"
        state: present
        exclusive: false
