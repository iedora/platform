# Local dev stack for the iedora backend — the WHOLE platform with hot reload.
# `pnpm dev` brings this up (detached) and runs the web app on the host.
#
# Every backend service runs on node:26 with `node --watch` (Node 26 runs .ts
# directly and restarts on change — no build, no nodemon), source bind-mounted so
# edits reload instantly. node_modules lives in a NAMED volume (installed INSIDE
# the linux container so native modules match the runtime), populated ONCE by the
# `install` one-shot so the 7 services don't race on a shared pnpm install.
#
# Services reach each other over the compose network by name (http://auth:8080),
# and Postgres at postgres:5432. Each service owns its own database and migrates
# on boot (MIGRATE_ON_BOOT=1 — dev only; prod migrates as the owner role).
name: iedora-api

# Shared OpenTelemetry export — traces/metrics/logs flow to a local collector if
# one is running (infra/local stack); with it down, exports fail quietly.
x-otel-env: &otel-env
  OTEL_EXPORTER_OTLP_ENDPOINT: http://host.docker.internal:4318
  OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
  OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE: cumulative

# Shared dev identity — ONE Ed25519 keypair signs every token, so services
# cross-verify. Non-secret dev values (never used in prod).
x-svc-env: &svc-env
  DEPLOYMENT_ENV: development
  MIGRATE_ON_BOOT: "1"
  # Public half of the dev signing key (auth holds the private half below).
  API_JWT_PUBLIC_KEY: M+/u/gPyq9NyuwfMjS82Y7lOJeyvGq6jpeRxMqr1Ge4=
  SERVICE_JWT_PUBLIC_KEY: M+/u/gPyq9NyuwfMjS82Y7lOJeyvGq6jpeRxMqr1Ge4=
  API_JWT_ISSUER: https://api.iedora.com
  SERVICE_JWT_ISSUER: https://api.iedora.com
  API_JWT_AUDIENCE: iedora-api
  SERVICE_AUDIENCE: iedora-internal

# Common shape for a node service (bind-mounted source + shared node_modules,
# waits for the one-shot install + a healthy Postgres).
x-node: &node
  image: node:26.5.0-slim
  working_dir: /app
  volumes:
    - .:/app
    - node_modules:/app/node_modules
  restart: unless-stopped
  depends_on:
    install:
      condition: service_completed_successfully
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: iedora
      POSTGRES_PASSWORD: iedora
      POSTGRES_DB: postgres # each service creates its OWN database (database-per-service)
    volumes:
      - pgdata:/var/lib/postgresql
      # Pre-create the per-service dev databases on first init (auth doesn't create its own).
      - ./scripts/dev-initdb.sql:/docker-entrypoint-initdb.d/00-databases.sql:ro
    ports:
      - "55433:5432" # non-default to avoid colliding with a host Postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U iedora"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 10s
    restart: unless-stopped

  # One-shot: install deps into the shared node_modules volume, then exit. Every
  # service waits for this (service_completed_successfully), so installs run ONCE.
  install:
    image: node:26.5.0-slim
    working_dir: /app
    # CI=1 puts pnpm in non-interactive mode: no update-notifier / background
    # registry pings that (on Node 26) can leave a socket open and stop the
    # process exiting — which would hang every dependent on this one-shot. It
    # also makes the postinstall git-hooks step early-exit (no .git in here).
    environment:
      CI: "1"
    command: sh -c "npm i -g pnpm@11.15.1 && pnpm install --frozen-lockfile"
    volumes:
      - .:/app
      - node_modules:/app/node_modules

  # The standalone multi-tenant auth service (@iedora/auth). Signs with
  # JWT_SIGNING_KEYS; issuer must match what consumers verify (API_JWT_ISSUER).
  # NOTE: a full login flow needs a seeded tenant realm (audience=iedora-api,
  # password provider, service clients) — see services/auth/scripts. Booting the
  # service only needs DATABASE_URL.
  auth:
    <<: *node
    command: sh -c "exec sh services/docker-entrypoint.sh node --watch services/auth/src/index.ts"
    environment:
      <<: [*otel-env, *svc-env]
      PORT: "8080"
      DATABASE_URL: postgres://iedora:iedora@postgres:5432/auth?sslmode=disable
      ISSUER_URL: https://api.iedora.com
      # Dev Ed25519 seed (base64url) whose public half is the shared API_JWT_PUBLIC_KEY.
      JWT_SIGNING_KEYS: 4qiWAUBUtlk6abEM-o0urqz3tGcSVjg8f_NyRa5wWeI
      ADMIN_TOKEN: dev-admin-token
      PLATFORM_ADMINS: eduardoferdcarvalho@gmail.com
      APP_BASE_URL: http://localhost:3000
      SMTP_HOST: mailhog
      SMTP_PORT: "1025"
    ports:
      - "8180:8080"

  menu:
    <<: *node
    command: sh -c "exec sh services/docker-entrypoint.sh node --watch products/menu/api/src/index.ts"
    environment:
      <<: [*otel-env, *svc-env]
      MENU_PORT: "8084"
      MENU_DATABASE_URL: postgres://iedora:iedora@postgres:5432/menu?sslmode=disable
      AUTH_BASE_URL: http://auth:8080
      BILLING_BASE_URL: http://billing:8083
      AUDIT_BASE_URL: http://audit:8081
      SERVICE_CLIENT_ID: menu
      SERVICE_CLIENT_SECRET: dev-secret
    ports:
      - "8184:8084"

  audit:
    <<: *node
    command: sh -c "exec sh services/docker-entrypoint.sh node --watch services/audit/src/index.ts"
    environment:
      <<: [*otel-env, *svc-env]
      AUDIT_PORT: "8081"
      AUDIT_DATABASE_URL: postgres://iedora:iedora@postgres:5432/audit?sslmode=disable
    ports:
      - "8181:8081"

  email:
    <<: *node
    command: sh -c "exec sh services/docker-entrypoint.sh node --watch services/email/src/index.ts"
    environment:
      <<: [*otel-env, *svc-env]
      EMAIL_PORT: "8082"
      EMAIL_DATABASE_URL: postgres://iedora:iedora@postgres:5432/email?sslmode=disable
      EMAIL_FROM: "iedora (dev) <no-reply@iedora.test>"
      SMTP_HOST: mailhog
      SMTP_PORT: "1025"
    ports:
      - "8182:8082"

  billing:
    <<: *node
    command: sh -c "exec sh services/docker-entrypoint.sh node --watch services/billing/src/index.ts"
    environment:
      <<: [*otel-env, *svc-env]
      BILLING_PORT: "8083"
      BILLING_DATABASE_URL: postgres://iedora:iedora@postgres:5432/billing?sslmode=disable
      AUTH_BASE_URL: http://auth:8080
      AUDIT_BASE_URL: http://audit:8081
      SERVICE_CLIENT_ID: billing
      SERVICE_CLIENT_SECRET: dev-secret
      # Stripe is optional in dev (env, not required) — charges no-op without it.
    ports:
      - "8183:8083"

  tutor-api:
    <<: *node
    command: sh -c "exec sh services/docker-entrypoint.sh node --watch products/tutor/api/src/index.ts"
    environment:
      <<: [*otel-env, *svc-env]
      TUTOR_API_PORT: "8085"
      TUTOR_DATABASE_URL: postgres://iedora:iedora@postgres:5432/tutor?sslmode=disable
      AUTH_BASE_URL: http://auth:8080
      BILLING_BASE_URL: http://billing:8083
      SERVICE_CLIENT_ID: tutor
      SERVICE_CLIENT_SECRET: dev-secret
      # Durable lesson timers run on @iedora/jobs (Postgres) — no external worker.
      CLASSROOM_SIGNING_KEY: dev-classroom-signing-secret-please-min-32b
      # Browser-facing: the minted room link the student/tutor open (host-mapped).
      CLASSROOM_URL: http://localhost:8186
    ports:
      - "8185:8085"

  classroom:
    <<: *node
    command: sh -c "exec node --watch services/classroom/src/index.ts" # no DB, no migrate
    environment:
      <<: [*otel-env, *svc-env]
      CLASSROOM_PORT: "8086"
      # MUST match tutor-api's CLASSROOM_SIGNING_KEY (verifies the room tokens it mints).
      CLASSROOM_SIGNING_KEY: dev-classroom-signing-secret-please-min-32b
    ports:
      - "8186:8086"

  # Local SMTP sink: captures every email the stack sends. Inbox at http://localhost:8025.
  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"
      - "8025:8025"
    restart: unless-stopped

volumes:
  pgdata:
  node_modules:
