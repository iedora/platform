# Local dev stack for the iedora backend (Bun/Hono services) — runs on OrbStack.
# Postgres + the ported services with hot reload. Brought up via `bun run api:up`.
#
# node_modules lives in a NAMED volume, not the host bind mount: dependencies are
# installed INSIDE the linux container so native modules (e.g. @node-rs/argon2,
# arriving with the auth service) match the runtime, never the host's macOS build.
#
# This is the Bun side of the strangler migration; the legacy Go stack still runs
# from ../backend/docker-compose.yml (the `dev:*` scripts) until each role cuts over.
name: iedora-api

services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: iedora
      POSTGRES_PASSWORD: iedora
      POSTGRES_DB: postgres # per-service DBs are created by the migrate step
    volumes:
      - pgdata:/var/lib/postgresql
    # 55433 (not 55432) so this coexists with the legacy Go dev stack during the
    # strangler migration. Services reach Postgres over the compose network.
    ports:
      - "55433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U iedora"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 10s
    restart: unless-stopped

  audit:
    image: oven/bun:1.3.3-alpine
    working_dir: /app
    command: sh -c "bun install --frozen-lockfile && bun run services/audit/src/migrate.ts && bun run --hot services/audit/src/index.ts"
    environment:
      DEPLOYMENT_ENV: development
      AUDIT_PORT: "8081"
      AUDIT_DATABASE_URL: postgres://iedora:iedora@postgres:5432/audit?sslmode=disable
      # Verifies internal service tokens. DEV keypair shared with the Go stack
      # (auth's API_JWT_PRIVATE_KEY) so tokens cross-verify during the migration.
      SERVICE_JWT_PUBLIC_KEY: M+/u/gPyq9NyuwfMjS82Y7lOJeyvGq6jpeRxMqr1Ge4=
      SERVICE_JWT_ISSUER: https://api.iedora.com
      SERVICE_AUDIENCE: iedora-internal
    # Host 8181 (container 8081) to coexist with the legacy Go audit on 8081.
    ports:
      - "8181:8081"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  node_modules:
