# Local dev stack for the iedora backend (Bun/Hono services) — runs on OrbStack.
# Postgres + the ported services with hot reload. Brought up via `pnpm run api:up`.
#
# node_modules lives in a NAMED volume, not the host bind mount: dependencies are
# installed INSIDE the linux container so native modules (e.g. @node-rs/argon2,
# arriving with the auth service) match the runtime, never the host's macOS build.
name: iedora-api

# Shared OpenTelemetry export config — every service merges this so traces,
# metrics + logs flow to the OTel Collector in the sibling `infra/local` stack
# (otel-collector -> Tempo + Prometheus + Loki -> Grafana). Bring that up
# (`docker compose -f ../infra/local/compose.yaml up -d`) to view telemetry at
# http://localhost:3001; with it down, exports just fail (logged, non-fatal) — so
# api:up no longer ships a telemetry backend of its own. This mirrors prod, where
# each service exports to a collector accessory it doesn't run itself; the base
# endpoint has no trailing path (the SDK appends /v1/traces etc.). No auth header:
# the local collector is unauthenticated (prod's tenant/auth wiring is added
# collector-side, not here). To silence exports entirely, unset the endpoint.
x-otel-env: &otel-env
  OTEL_EXPORTER_OTLP_ENDPOINT: http://host.docker.internal:4318
  # http/protobuf is the OTel-spec default and the most reliable transport under
  # Bun (never gRPC/node:http2). The exporters are proto by package import; this
  # documents the wire protocol and covers any env-driven code path.
  OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
  # CUMULATIVE is required for the Prometheus backend — the collector's
  # prometheusremotewrite exporter silently drops delta counters/histograms. The
  # SDK also defaults to cumulative now (no code override), but pin it here so the
  # choice is declarative and can't drift.
  OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE: cumulative

services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: iedora
      POSTGRES_PASSWORD: iedora
      POSTGRES_DB: postgres # maintenance DB; each service creates its OWN database (database-per-service)
    volumes:
      - pgdata:/var/lib/postgresql
    # 55433 (not the default 55432) to avoid colliding with a local Postgres on
    # the host. Services reach Postgres over the compose network.
    ports:
      - "55433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U iedora"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 10s
    restart: unless-stopped

  # NOTE: the audit + billing services moved to their own repos (iedora/audit,
  # iedora/billing; email is iedora/email). Run them from those repos on the
  # shared `iedora` docker network when you need them locally — menu/auth tolerate
  # them being down (the audit relay retries; billing-gated staff features
  # degrade). The *_BASE_URL vars below still resolve to those container names.

  auth:
    image: node:26.5.0-slim
    working_dir: /app
    command: sh -c "npm i -g pnpm@11.15.1 && pnpm install --frozen-lockfile && exec sh services/docker-entrypoint.sh node --watch services/auth/src/index.ts"
    environment:
      <<: *otel-env
      DEPLOYMENT_ENV: development
      AUTH_PORT: "8080"
      AUTH_DATABASE_URL: postgres://iedora:iedora@postgres:5432/auth?sslmode=disable
      # Audit is delivered over HTTP (hard rule: no cross-service DB access). Auth
      # holds the signing key, so it self-mints its own service token to POST here.
      AUDIT_BASE_URL: http://audit:8081
      # DEV keypair — shared across the stack so tokens cross-verify between services.
      API_JWT_PRIVATE_KEY: 4qiWAUBUtlk6abEM+o0urqz3tGcSVjg8f/NyRa5wWeI=
      API_JWT_ISSUER: https://api.iedora.com
      API_JWT_AUDIENCE: iedora-api
      SERVICE_CLIENTS: admin-bff:dev-secret,menu:dev-secret,billing:dev-secret
      SERVICE_AUDIENCE: iedora-internal
      # Dev role grants: this email is promoted to iedora-admin (the staff role)
      # on its next login/register. Format: "role=id,@domain; role2=id2".
      ROLE_GRANTS: iedora-admin=eduardoferdcarvalho@gmail.com
      # Local email → MailHog (no auth). Captured at http://localhost:8025.
      # Prod points the same vars at Resend SMTP (host/user/pass/secure).
      SMTP_HOST: mailhog
      SMTP_PORT: "1025"
      MAIL_FROM: "iedora (dev) <no-reply@iedora.test>"
    # Host 8180 (container 8080) to avoid colliding with a local service on 8080.
    ports:
      - "8180:8080"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      mailhog:
        condition: service_started
    restart: unless-stopped

  menu:
    image: node:26.5.0-slim
    working_dir: /app
    command: sh -c "npm i -g pnpm@11.15.1 && pnpm install --frozen-lockfile && exec sh services/docker-entrypoint.sh node --watch products/menu/api/src/index.ts"
    environment:
      <<: *otel-env
      DEPLOYMENT_ENV: development
      MENU_PORT: "8084"
      MENU_DATABASE_URL: postgres://iedora:iedora@postgres:5432/menu?sslmode=disable
      # Verifies dashboard USER tokens (public half of auth's signing key — the
      # DEV keypair shared across the stack so tokens cross-verify between services).
      API_JWT_PUBLIC_KEY: M+/u/gPyq9NyuwfMjS82Y7lOJeyvGq6jpeRxMqr1Ge4=
      API_JWT_ISSUER: https://api.iedora.com
      API_JWT_AUDIENCE: iedora-api
      # Plan gate: mint a service token via auth, read the subscription from billing.
      # Admin aggregation also reads the audit trail (audit) + tenant owner (auth).
      AUTH_BASE_URL: http://auth:8080
      BILLING_BASE_URL: http://billing:8083
      AUDIT_BASE_URL: http://audit:8081
      SERVICE_CLIENT_ID: menu
      SERVICE_CLIENT_SECRET: dev-secret
    # Host 8184 (container 8084) to avoid colliding with a local service on 8084.
    ports:
      - "8184:8084"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      auth:
        condition: service_started
    restart: unless-stopped

  # Local SMTP sink: captures every email the stack sends (no real delivery).
  # SMTP on 1025 (what the auth service points at), web inbox on 8025.
  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"
      - "8025:8025"
    restart: unless-stopped

volumes:
  pgdata:
  node_modules:
