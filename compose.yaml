# Local dev stack for the iedora backend (Bun/Hono services) — runs on OrbStack.
# Postgres + the ported services with hot reload. Brought up via `bun run api:up`.
#
# node_modules lives in a NAMED volume, not the host bind mount: dependencies are
# installed INSIDE the linux container so native modules (e.g. @node-rs/argon2,
# arriving with the auth service) match the runtime, never the host's macOS build.
name: iedora-api

services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: iedora
      POSTGRES_PASSWORD: iedora
      POSTGRES_DB: postgres # per-service DBs are created by the migrate step
    volumes:
      - pgdata:/var/lib/postgresql
    # 55433 (not the default 55432) to avoid colliding with a local Postgres on
    # the host. Services reach Postgres over the compose network.
    ports:
      - "55433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U iedora"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 10s
    restart: unless-stopped

  audit:
    image: oven/bun:1.3.3-alpine
    working_dir: /app
    command: sh -c "bun install --frozen-lockfile && exec sh services/docker-entrypoint.sh bun run --hot services/audit/src/index.ts"
    environment:
      DEPLOYMENT_ENV: development
      AUDIT_PORT: "8081"
      AUDIT_DATABASE_URL: postgres://iedora:iedora@postgres:5432/audit?sslmode=disable
      # Verifies internal service tokens. DEV keypair, shared across the stack
      # (auth's API_JWT_PRIVATE_KEY) so tokens cross-verify between services.
      SERVICE_JWT_PUBLIC_KEY: M+/u/gPyq9NyuwfMjS82Y7lOJeyvGq6jpeRxMqr1Ge4=
      SERVICE_JWT_ISSUER: https://api.iedora.com
      SERVICE_AUDIENCE: iedora-internal
    # Host 8181 (container 8081) to avoid colliding with a local service on 8081.
    ports:
      - "8181:8081"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  auth:
    image: oven/bun:1.3.3-alpine
    working_dir: /app
    command: sh -c "bun install --frozen-lockfile && exec sh services/docker-entrypoint.sh bun run --hot services/auth/src/index.ts"
    environment:
      DEPLOYMENT_ENV: development
      AUTH_PORT: "8080"
      AUTH_DATABASE_URL: postgres://iedora:iedora@postgres:5432/auth?sslmode=disable
      AUDIT_DATABASE_URL: postgres://iedora:iedora@postgres:5432/audit?sslmode=disable
      # DEV keypair — shared across the stack so tokens cross-verify between services.
      API_JWT_PRIVATE_KEY: 4qiWAUBUtlk6abEM+o0urqz3tGcSVjg8f/NyRa5wWeI=
      API_JWT_ISSUER: https://api.iedora.com
      API_JWT_AUDIENCE: iedora-api
      SERVICE_CLIENTS: admin-bff:dev-secret,menu:dev-secret
      SERVICE_AUDIENCE: iedora-internal
      # Dev role grants: this email is promoted to iedora-admin (the staff role)
      # on its next login/register. Format: "role=id,@domain; role2=id2".
      ROLE_GRANTS: iedora-admin=eduardoferdcarvalho@gmail.com
    # Host 8180 (container 8080) to avoid colliding with a local service on 8080.
    ports:
      - "8180:8080"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  billing:
    image: oven/bun:1.3.3-alpine
    working_dir: /app
    command: sh -c "bun install --frozen-lockfile && exec sh services/docker-entrypoint.sh bun run --hot services/billing/src/index.ts"
    environment:
      DEPLOYMENT_ENV: development
      BILLING_PORT: "8083"
      BILLING_DATABASE_URL: postgres://iedora:iedora@postgres:5432/billing?sslmode=disable
      AUDIT_DATABASE_URL: postgres://iedora:iedora@postgres:5432/audit?sslmode=disable
      # Verifies internal service tokens. DEV keypair, shared across the stack
      # (auth's API_JWT_PRIVATE_KEY) so tokens cross-verify between services.
      SERVICE_JWT_PUBLIC_KEY: M+/u/gPyq9NyuwfMjS82Y7lOJeyvGq6jpeRxMqr1Ge4=
      SERVICE_JWT_ISSUER: https://api.iedora.com
      SERVICE_AUDIENCE: iedora-internal
    # Host 8183 (container 8083) to avoid colliding with a local service on 8083.
    ports:
      - "8183:8083"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  menu:
    image: oven/bun:1.3.3-alpine
    working_dir: /app
    command: sh -c "bun install --frozen-lockfile && exec sh services/docker-entrypoint.sh bun run --hot services/menu/src/index.ts"
    environment:
      DEPLOYMENT_ENV: development
      MENU_PORT: "8084"
      MENU_DATABASE_URL: postgres://iedora:iedora@postgres:5432/menu?sslmode=disable
      AUDIT_DATABASE_URL: postgres://iedora:iedora@postgres:5432/audit?sslmode=disable
      # Verifies dashboard USER tokens (public half of auth's signing key — the
      # DEV keypair shared across the stack so tokens cross-verify between services).
      API_JWT_PUBLIC_KEY: M+/u/gPyq9NyuwfMjS82Y7lOJeyvGq6jpeRxMqr1Ge4=
      API_JWT_ISSUER: https://api.iedora.com
      API_JWT_AUDIENCE: iedora-api
      # Plan gate: mint a service token via auth, read the subscription from billing.
      # Admin aggregation also reads the audit trail (audit) + tenant owner (auth).
      AUTH_BASE_URL: http://auth:8080
      BILLING_BASE_URL: http://billing:8083
      AUDIT_BASE_URL: http://audit:8081
      SERVICE_CLIENT_ID: menu
      SERVICE_CLIENT_SECRET: dev-secret
    # Host 8184 (container 8084) to avoid colliding with a local service on 8084.
    ports:
      - "8184:8084"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  node_modules:
