# Destination override: Hetzner Cloud VM with a public IP.
# kamal-proxy handles TLS via Let's Encrypt.
#
# Env vars expected when running `kamal deploy -d hetzner`:
#   HETZNER_HOST        — the IP (or DNS A-record) of the VM
#   HETZNER_HOSTNAME    — the FQDN that resolves to HETZNER_HOST
#   S3_ENDPOINT         — R2/S3 endpoint URL
#   (S3_REGION, S3_BUCKET — optional, default in base config)
#
# Pre-req: DNS A-record HETZNER_HOSTNAME → HETZNER_HOST exists, ports 80/443
# open at the firewall. UFW rules (ports 22/80/443) are already loaded by
# the metal Ansible play.

servers:
  web:
    hosts:
      - <%= ENV.fetch("HETZNER_HOST") %>

proxy:
  ssl: true
  host: <%= ENV.fetch("HETZNER_HOSTNAME") %>

env:
  clear:
    BETTER_AUTH_URL: <%= "https://#{ENV.fetch('HETZNER_HOSTNAME')}" %>

accessories:
  postgres:
    host: <%= ENV.fetch("HETZNER_HOST") %>
  redis:
    host: <%= ENV.fetch("HETZNER_HOST") %>
