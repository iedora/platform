# Destination override: on-prem box behind a Cloudflare Tunnel.
# TLS terminates at the Cloudflare edge; kamal-proxy stays plain HTTP.
#
# Env vars expected when running `kamal deploy -d onprem` (or `make kamal-deploy`):
#   PUBLIC_HOSTNAME     — the FQDN configured on the Cloudflare Tunnel
#   S3_ENDPOINT         — R2/S3 endpoint URL
#   (S3_REGION, S3_BUCKET — optional, default in base config)

servers:
  web:
    hosts:
      - 192.168.50.53

proxy:
  ssl: false
  host: <%= ENV.fetch("PUBLIC_HOSTNAME") %>

env:
  clear:
    BETTER_AUTH_URL: <%= "https://#{ENV.fetch('PUBLIC_HOSTNAME')}" %>

accessories:
  postgres:
    host: 192.168.50.53
  redis:
    host: 192.168.50.53
