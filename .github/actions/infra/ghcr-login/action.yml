name: Log in to GHCR
description: Authenticates Docker with ghcr.io by fetching the PAT from BWS via bin/iedora-env.

inputs:
  bws-access-token:
    description: Bitwarden Secrets access token (secrets.BWS_ACCESS_TOKEN)
    required: true

runs:
  using: composite
  steps:
    - run: |
        set -euo pipefail
        bin/iedora-env bash -c '
          set -euo pipefail
          [ -n "${IAC_BOOTSTRAP_GHCR_TOKEN:-}" ] || { echo "IAC_BOOTSTRAP_GHCR_TOKEN missing in BWS" >&2; exit 1; }
          echo "$IAC_BOOTSTRAP_GHCR_TOKEN" | docker login ghcr.io -u eduvhc --password-stdin
        '
      shell: bash
      env:
        BWS_ACCESS_TOKEN: ${{ inputs.bws-access-token }}
