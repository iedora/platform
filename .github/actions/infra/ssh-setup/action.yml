name: Set up SSH
description: Writes the deploy SSH private key from BWS to ~/.ssh/id_ed25519. Optionally registers it with ssh-agent and exports SSH_AUTH_SOCK + SSH_AGENT_PID to GITHUB_ENV for downstream steps.

inputs:
  bws-access-token:
    description: Bitwarden Secrets access token (secrets.BWS_ACCESS_TOKEN)
    required: true
  register-agent:
    description: Register the key with ssh-agent and export env vars
    required: false
    default: 'true'

runs:
  using: composite
  steps:
    - run: |
        set -euo pipefail
        mkdir -p ~/.ssh && chmod 700 ~/.ssh
        bin/iedora-env bash -c 'printf "%s\n" "$IAC_BOOTSTRAP_SSH_PRIVATE_KEY"' > ~/.ssh/id_ed25519
        chmod 600 ~/.ssh/id_ed25519
        printf 'StrictHostKeyChecking accept-new\n' > ~/.ssh/config
        chmod 600 ~/.ssh/config
        if [ "${{ inputs.register-agent }}" = 'true' ]; then
          eval "$(ssh-agent -s)"
          ssh-add ~/.ssh/id_ed25519
          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> "$GITHUB_ENV"
          echo "SSH_AGENT_PID=$SSH_AGENT_PID" >> "$GITHUB_ENV"
        fi
      shell: bash
      env:
        BWS_ACCESS_TOKEN: ${{ inputs.bws-access-token }}
