name: Install bws CLI
description: Downloads and installs the Bitwarden Secrets CLI (bws). Auto-detects runner architecture.

inputs:
  bws-version:
    description: BWS CLI version to install
    required: false
    default: '2.0.0'

runs:
  using: composite
  steps:
    - run: |
        set -euo pipefail
        ARCH=$(uname -m)
        case "$ARCH" in
          x86_64) TRIPLE="x86_64-unknown-linux-gnu" ;;
          aarch64) TRIPLE="aarch64-unknown-linux-gnu" ;;
          *) echo "Unsupported architecture: $ARCH" >&2; exit 1 ;;
        esac
        curl -fsSL -o /tmp/bws.zip \
          "https://github.com/bitwarden/sdk-sm/releases/download/bws-v${{ inputs.bws-version }}/bws-${TRIPLE}-${{ inputs.bws-version }}.zip"
        unzip -q /tmp/bws.zip -d /tmp/bws
        sudo install -m 0755 /tmp/bws/bws /usr/local/bin/bws
      shell: bash
