# @iedora/product-menu CI.
#
# Workspace package at `products/menu/` — slices, drizzle schema +
# migrations, e2e test harness, all the menu surface code. Consumed
# by `apps/web` (the Next.js shell). Runs typecheck + lint + vitest +
# Playwright e2e (assembles a production menu build against Postgres +
# S3 mock services and drives chromium specs against it).

name: '[product:menu] CI'

on:
  push:
    branches: [main]
    paths:
      - 'products/menu/**'
      - 'packages/eslint-config/**'
      - '.github/workflows/product-menu.yml'
      - '.github/actions/setup/**'
      - '.github/actions/e2e-run/**'
      - '.github/scripts/wait-s3mock.sh'
  pull_request:
    branches: [main]
    paths:
      - 'products/menu/**'
      - 'packages/eslint-config/**'
      - '.github/workflows/product-menu.yml'
      - '.github/actions/setup/**'
      - '.github/actions/e2e-run/**'
      - '.github/scripts/wait-s3mock.sh'
  workflow_dispatch:

concurrency:
  group: product-menu-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    defaults:
      run:
        working-directory: products/menu
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - run: bun run typecheck

  lint:
    name: Lint
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    defaults:
      run:
        working-directory: products/menu
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - run: bun run lint

  unit:
    name: Unit (Vitest)
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    defaults:
      run:
        working-directory: products/menu
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup
      - if: github.event_name == 'pull_request'
        run: bun run test -- --changed=origin/main
      - if: github.event_name != 'pull_request'
        run: bun run test

  e2e:
    name: E2E (Playwright)
    needs: [typecheck, lint, unit]
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    # Matrix parked at single shard. Bump to ['1/2', '2/2'] when the
    # suite grows past ~10 min. Per-worker DB isolation already in
    # place under products/menu/src/shared/testing/.
    strategy:
      fail-fast: false
      matrix:
        shard: ['1/1']
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_PASSWORD: Password1!
          POSTGRES_DB: menu_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      s3mock:
        image: adobe/s3mock:latest
        env:
          initialBuckets: menu-test
        ports:
          - 9090:9090
    # No `defaults.run.working-directory` — every step delegates to
    # composite actions that set their own working directories. See
    # docs/testing/e2e-architecture.md for the full contract.
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - uses: ./.github/actions/e2e-run
        with:
          product: menu
          working_directory: products/menu
          db_name: menu_test
          needs_s3mock: true
          shard: ${{ matrix.shard }}
