# Pipeline mínimo — 3 jobs com path-based change detection.
# Deploy é Mac-driven (`bun run deploy`) — sem job de deploy aqui.
#
#   changes      → detecta o que mudou (code / docker)
#   correctness  → typecheck + lint + test (só se code mudou)
#   security     → gitleaks + hadolint + osv-scanner (sempre em PR/push/cron)
#
# Cron weekly só corre `security` (changes/correctness skipam via `if:`)
# — apanha CVEs novas sem precisar de push.
#
# Action pins (Node 24 runtime — Node 20 deprecação rolling 2026):
#   actions/checkout@v6.0.2       (2026-01-09)
#   oven-sh/setup-bun@v2.2.0      (2026-03-14, auto-cacha ~/.bun/install/cache)
#   dorny/paths-filter@v4.0.1     (2026-03-17)
#   hadolint/hadolint-action@v3.3.0
#   gitleaks 8.30.1, osv-scanner 2.3.8

name: CI

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'  # Segunda 06:00 UTC

permissions:
  contents: read

jobs:
  # ─────────────────────────────────────────────────────────────────
  # Path filter. `correctness` gate-iza em `code`. `security` ignora.
  # ─────────────────────────────────────────────────────────────────
  changes:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.f.outputs.code }}
      docker: ${{ steps.f.outputs.docker }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 2
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: f
        with:
          filters: |
            code:
              - '**/*.ts'
              - '**/*.tsx'
              - '**/*.js'
              - '**/*.mjs'
              - '**/*.cjs'
              - '**/package.json'
              - 'bun.lock'
              - '**/tsconfig*.json'
              - '**/vitest.config.*'
              - '**/eslint.config.*'
            docker:
              - '**/Dockerfile'

  # ─────────────────────────────────────────────────────────────────
  # typecheck + lint + test. setup-bun@v2.2 auto-cacha
  # ~/.bun/install/cache — sem actions/cache manual.
  # ─────────────────────────────────────────────────────────────────
  correctness:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    concurrency:
      group: correctness-${{ github.ref }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.14'
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun run lint
      - run: bun run test

  # ─────────────────────────────────────────────────────────────────
  # gitleaks (history scan) + hadolint (Dockerfile lint) + osv-scanner
  # (lockfile CVEs). hadolint-action emite annotations natively; OSV
  # usa gh-annotations format. Gitleaks binário evita o
  # GITLEAKS_LICENSE da action oficial (gated em repos de org).
  # ─────────────────────────────────────────────────────────────────
  security:
    concurrency:
      group: security-${{ github.ref }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GITLEAKS_VERSION: 8.30.1
      OSV_VERSION: 2.3.8
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0  # gitleaks varre todo o histórico

      - name: gitleaks
        run: |
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          ./gitleaks detect \
            --baseline-path .gitleaks-baseline.json \
            --redact --verbose --no-banner --exit-code 1

      - name: hadolint
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: apps/web/Dockerfile
          failure-threshold: error  # warnings anotam, não bloqueiam

      - name: osv-scanner
        run: |
          curl -fsSL -o osv-scanner \
            "https://github.com/google/osv-scanner/releases/download/v${OSV_VERSION}/osv-scanner_linux_amd64"
          chmod +x osv-scanner
          ./osv-scanner --lockfile=bun.lock --format gh-annotations
