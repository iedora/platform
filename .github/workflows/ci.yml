# GitHub Actions CI — correctness (typecheck/lint/test) + security, path-filtered,
# with a fan-in gate. `pnpm run {typecheck,lint,test}` route through Turborepo
# (`turbo run …`) + the oxlint pre-pass, so unchanged packages are cache hits.
# The .turbo dir is persisted across runs (actions/cache) — the poor-man's remote
# cache. For a true cross-team remote cache, set TURBO_TOKEN + TURBO_TEAM (Vercel)
# or point TURBO_API at a self-hosted cache and drop the actions/cache step.
name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

# One run per ref. A new push to a PR cancels the superseded run (saves
# free-tier minutes); main runs are never cancelled. github.workflow scopes the
# group so other workflows aren't affected. Pairing `push: [main]` with
# `pull_request` also means a PR gets ONE run, not the push+PR double-run.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.f.outputs.code }}
      docker: ${{ steps.f.outputs.docker }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 2
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: f
        with:
          filters: |
            code:
              - '**/*.ts'
              - '**/*.tsx'
              - '**/*.js'
              - '**/*.mjs'
              - '**/*.cjs'
              - '**/package.json'
              - 'pnpm-lock.yaml'
              - '**/tsconfig*.json'
              - '**/vitest.config.*'
              - '**/eslint.config.*'
              - '.oxlintrc.json'
              - 'turbo.json'
              - '.github/workflows/**'
            docker:
              - '**/Dockerfile'

  correctness:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Turborepo remote cache: when a self-hosted cache is stood up (e.g. ducktape
    # / turborepo-remote-cache on the homelab), set the TURBO_TOKEN secret + the
    # TURBO_TEAM / TURBO_API repo variables and the whole team + CI share one
    # cache. Empty here = turbo falls back to the actions/cache step below, so CI
    # works today with no extra infra.
    # Test Postgres: the integration harnesses (billing/auth/server-kit) call
    # createScratchDatabase(), which CREATE DATABASEs a throwaway DB per suite on
    # this server and migrates it — no pre-provisioned schemas needed, just a
    # superuser. TEST_DATABASE_URL points ADMIN_URL at it (127.0.0.1 to force IPv4
    # to the service). DATABASE_URL stays unset, so the HAS_DB-gated framework/db
    # suites skip (as they do locally). It reaches `vitest` via turbo.json
    # passThroughEnv — turbo strips undeclared env from tasks otherwise.
    # Both backing stores run as services: containers. MinIO needs the
    # `server /data` command — supported on services since GitHub added the
    # command/entrypoint keys (April 2026). Its health check curls MinIO's own
    # /minio/health/live (the image ships curl), so the job only starts once
    # both are ready. The blob test's beforeAll creates the bucket idempotently.
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: iedora
          POSTGRES_PASSWORD: iedora
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      minio:
        image: minio/minio
        env:
          MINIO_ROOT_USER: minio
          MINIO_ROOT_PASSWORD: minio12345
        ports:
          - 9000:9000
        command: server /data
        options: >-
          --health-cmd "curl -sf http://localhost:9000/minio/health/live"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
      TURBO_API: ${{ vars.TURBO_API }}
      TEST_DATABASE_URL: postgres://iedora:iedora@127.0.0.1:5432/postgres
      # S3-compatible object storage for the aws4fetch BlobClient integration test
      # (products/menu/api). Points at the MinIO service; the suite skips when
      # S3_TEST_ENDPOINT is unset (like the HAS_DB db suites).
      S3_TEST_ENDPOINT: http://127.0.0.1:9000
      S3_TEST_ACCESS_KEY: minio
      S3_TEST_SECRET_KEY: minio12345
      S3_TEST_BUCKET: uploads-test
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      # pnpm reads the version from packageManager; setup-node runs on the
      # production runtime (Node 26.5) and caches the pnpm store keyed on the lockfile.
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '26.5.0'
          cache: pnpm
      # Persist Turborepo's .turbo across runs so unchanged packages skip
      # typecheck/lint/test. Keyed on the lockfile + configs.
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'turbo.json', '.oxlintrc.json') }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'turbo.json', '.oxlintrc.json') }}-
            turbo-${{ runner.os }}-
      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck
      - run: pnpm run lint
      # DB integration harnesses each CREATE a scratch DB on the one CI Postgres;
      # serialize so they don't contend. TEST_DATABASE_URL reaches them via
      # turbo.json passThroughEnv (turbo strips undeclared env by default).
      - run: pnpm exec turbo run test --concurrency=1
      # Full production build of the web app. Catches what typecheck/test miss —
      # clean-install module resolution, Tailwind v4 @source scanning, the
      # next-intl request/i18n config, and RSC/turbopack bundling. Runs under the
      # SAME condition as the production image (Dockerfile: SKIP_ENV_VALIDATION=1,
      # no runtime secrets) so a build that needs real env at module load — like
      # vantage's clients — fails here instead of at `kamal deploy`.
      - name: next build (apps/web)
        run: pnpm --dir apps/web run build
        env:
          SKIP_ENV_VALIDATION: '1'

  security:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GITLEAKS_VERSION: 8.30.1
      OSV_VERSION: 2.3.8
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0 # gitleaks scans the whole history

      - name: gitleaks
        run: |
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          ./gitleaks detect \
            --baseline-path .gitleaks-baseline.json \
            --redact --verbose --no-banner --exit-code 1

      - name: hadolint (web image)
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: Dockerfile
          failure-threshold: error

      - name: hadolint (api image)
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: services/Dockerfile
          failure-threshold: error

      - name: osv-scanner
        run: |
          curl -fsSL -o osv-scanner \
            "https://github.com/google/osv-scanner/releases/download/v${OSV_VERSION}/osv-scanner_linux_amd64"
          chmod +x osv-scanner
          ./osv-scanner --lockfile=pnpm-lock.yaml --format gh-annotations

  # Fan-in gate: always runs, treats path-skipped legs as legitimate, fails on any
  # real failure/cancellation. The single status check to require on the branch.
  ci-ok:
    needs: [changes, correctness, security]
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: All jobs green or legitimately skipped
        env:
          RESULTS: ${{ toJSON(needs) }}
        run: |
          echo "$RESULTS" | jq -e 'all(.[]; .result == "success" or .result == "skipped")'
